<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>More - Tenant Dashboard</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">

        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary": "#001c89",
              "surface-container-lowest": "#ffffff",
              "on-secondary-fixed-variant": "#494267",

              "on-secondary-container": "#5f587f",
              "on-surface-variant": "#444655",
              "error": "#ba1a1a",
              "primary": "#001790",
              "background": "#faf9f9",
              "on-background": "#1b1c1c",
              "on-primary-fixed-variant": "#0a2acf",
              "primary-fixed": "#dfe0ff",
              "primary-container": "#0025cc",
              "tertiary-fixed-dim": "#bac3ff",
              "surface-variant": "#e3e2e2",
              "on-tertiary-container": "#9eabff",
              "on-secondary": "#ffffff",
              "on-error": "#ffffff",
              "on-secondary-fixed": "#1d1639",
              "surface-container-low": "#f4f3f3",
              "error-container": "#ffdad6",
              "outline": "#757687",
              "surface-tint": "#334ae6",
              "on-error-container": "#93000a",
              "on-tertiary": "#ffffff",
              "on-primary-container": "#a0abff",
              "inverse-surface": "#2f3031",
              "inverse-primary": "#bcc2ff",
              "secondary-fixed-dim": "#cac1ed",
              "secondary-container": "#dbd1ff",
              "outline-variant": "#c5c5d8",
              "on-primary-fixed": "#000c61",
              "on-surface": "#1b1c1c",
              "secondary-fixed": "#e6deff",
              "on-tertiary-fixed": "#00105c",
              "tertiary-container": "#002cc2",
              "surface-container": "#efeded",
              "surface": "#faf9f9",
              "primary-fixed-dim": "#bcc2ff",
              "inverse-on-surface": "#f2f0f0",
              "tertiary-fixed": "#dee0ff",
              "on-tertiary-fixed-variant": "#002eca",
              "surface-bright": "#faf9f9",
              "surface-dim": "#dbdad9",
              "on-primary": "#ffffff"

            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-fixed antialiased">
<!-- TopAppBar Section -->
<header class="w-full sticky top-0 z-50 bg-[#FAF9F9] dark:bg-slate-950 flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-white overflow-hidden">
<span class="text-xs font-bold">BL</span>
</div>
<h1 class="font-['Plus_Jakarta_Sans'] font-semibold text-lg text-[#001790] dark:text-blue-400">Tenant Dashboard</h1>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-500 active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<main class="max-w-2xl mx-auto px-6 py-8 pb-32">
<!-- Editorial Header -->
<section class="mb-10">
<h2 class="font-headline text-3xl font-bold tracking-tight text-primary mb-2">More</h2>
<p class="text-on-surface-variant font-body">Manage your business operations and account settings from a single command center.</p>
</section>
<!-- Feature List (No Borders, Tonal Separation) -->
<div class="flex flex-col gap-4">
<!-- Content Management -->
<button class="flex items-center gap-6 p-5 bg-surface-container-low rounded-xl group hover:bg-surface-container-high transition-all active:scale-[0.98]">
<div class="w-14 h-14 rounded-xl bg-primary-container/10 flex items-center justify-center text-primary-container">
<span class="material-symbols-outlined text-2xl" data-icon="article">article</span>
</div>
<div class="flex-1 text-left">
<h3 class="font-headline font-semibold text-on-surface">Content Management</h3>
<p class="text-label-md text-on-surface-variant leading-tight mt-0.5">Edit pages, blogs, and visual assets for your storefront.</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Customers -->
<button class="flex items-center gap-6 p-5 bg-surface-container-low rounded-xl group hover:bg-surface-container-high transition-all active:scale-[0.98]">
<div class="w-14 h-14 rounded-xl bg-secondary-container/30 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined text-2xl" data-icon="group">group</span>
</div>
<div class="flex-1 text-left">
<h3 class="font-headline font-semibold text-on-surface">Customers</h3>
<p class="text-label-md text-on-surface-variant leading-tight mt-0.5">View profiles, purchase history, and segment your audience.</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Inventory -->
<button class="flex items-center gap-6 p-5 bg-surface-container-low rounded-xl group hover:bg-surface-container-high transition-all active:scale-[0.98]">
<div class="w-14 h-14 rounded-xl bg-primary-fixed flex items-center justify-center text-on-primary-fixed-variant">
<span class="material-symbols-outlined text-2xl" data-icon="inventory_2">inventory_2</span>
</div>
<div class="flex-1 text-left">
<h3 class="font-headline font-semibold text-on-surface">Inventory</h3>
<p class="text-label-md text-on-surface-variant leading-tight mt-0.5">Track stock levels, warehouse locations, and restock alerts.</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Sales & Promotions -->
<button class="flex items-center gap-6 p-5 bg-surface-container-low rounded-xl group hover:bg-surface-container-high transition-all active:scale-[0.98]">
<div class="w-14 h-14 rounded-xl bg-error-container/40 flex items-center justify-center text-error">
<span class="material-symbols-outlined text-2xl" data-icon="campaign">campaign</span>
</div>
<div class="flex-1 text-left">
<h3 class="font-headline font-semibold text-on-surface">Sales &amp; Promotions</h3>
<p class="text-label-md text-on-surface-variant leading-tight mt-0.5">Create discount codes, flash sales, and campaign banners.</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Divider (Spacer based on No-Line Rule) -->
<div class="py-4"></div>
<!-- Store Settings -->
<button class="flex items-center gap-6 p-5 bg-surface-container-lowest border border-outline-variant/15 rounded-xl group hover:shadow-lg hover:shadow-primary/5 transition-all active:scale-[0.98]">
<div class="w-14 h-14 rounded-xl bg-slate-100 flex items-center justify-center text-outline">
<span class="material-symbols-outlined text-2xl" data-icon="settings">settings</span>
</div>
<div class="flex-1 text-left">
<h3 class="font-headline font-semibold text-on-surface">Store Settings</h3>
<p class="text-label-md text-on-surface-variant leading-tight mt-0.5">Configure domain, payments, and team permissions.</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- Footer Note -->
<footer class="mt-12 text-center">
<p class="text-label-md text-outline italic">Dashboard Version 2.4.0-Architect</p>
</footer>
</main>
<!-- BottomNavBar Section -->
<!-- The 'More' tab is active: Applied style_active_navigation to the 5th item -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-2 bg-[#FAF9F9]/80 dark:bg-slate-950/80 backdrop-blur-xl z-50 border-t border-slate-200/20 shadow-[0px_-4px_16px_rgba(12,5,40,0.04)]">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1.5 transition-all hover:text-[#001790]" href="#">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-['Inter'] font-medium text-[10px]">Home</span>
</a>
<!-- Orders -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1.5 transition-all hover:text-[#001790]" href="#">
<span class="material-symbols-outlined mb-1" data-icon="shopping_bag">shopping_bag</span>
<span class="font-['Inter'] font-medium text-[10px]">Orders</span>
</a>
<!-- Products -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1.5 transition-all hover:text-[#001790]" href="#">
<span class="material-symbols-outlined mb-1" data-icon="inventory_2">inventory_2</span>
<span class="font-['Inter'] font-medium text-[10px]">Products</span>
</a>
<!-- Marketing -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1.5 transition-all hover:text-[#001790]" href="#">
<span class="material-symbols-outlined mb-1" data-icon="campaign">campaign</span>
<span class="font-['Inter'] font-medium text-[10px]">Marketing</span>
</a>
<!-- More (ACTIVE) -->
<a class="flex flex-col items-center justify-center bg-[#0025CC] text-white rounded-xl px-3 py-1.5 transition-all active:scale-95 duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="more_horiz" style="font-variation-settings: 'FILL' 1;">more_horiz</span>
<span class="font-['Inter'] font-medium text-[10px]">More</span>
</a>
</nav>
</body></html>
